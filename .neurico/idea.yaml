idea:
  title: Diluted Steganography
  domain: nlp
  hypothesis: 'Investigate how current large language models handle signal dilution
    in steganographic contexts, specifically when secret messages are hidden in more
    diluted patterns (e.g., the word after each use of a specific token), and whether
    their ability to detect or extract such messages degrades as the signal becomes
    more diluted.

    '
  background:
    description: 'As data generation becomes cheaper and more prolific, the dilution
      of meaningful signals within large corpora is likely to become a significant
      issue. Current LLMs can detect simple steganographic signals, such as messages
      hidden in the first letter of each line, when prompted. This research explores
      how LLMs perform when the signal is more diluted, such as hiding messages in
      the word following each occurrence of a specific word, and seeks to understand
      the limits of LLMs'' ability to detect or extract such diluted signals.

      '
  metadata:
